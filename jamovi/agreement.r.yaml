        - name: f_statistic
          title: 'F-statistic'
          type: number
        - name: df
          title: 'df'
          type: text
        - name: p
          title: 'p-value'
          type: number
          format: zto,pvalue
        - name: interpretation
          title: 'Interpretation'
          type: text
      clearWith:
          - vars
          - finnLevels
          - finnModel

    - name: finnExplanation
      title: "About Finn Coefficient"
      type: Html
      visible: (showFinnGuide)
      clearWith:
          - showFinnGuide

    - name: kendallWTable
