    - name: krippTableHeading
      title: "Krippendorff's Alpha"
      type:  Preformatted
      visible: (kripp || showKrippGuide)
      clearWith:
          - kripp
          - showKrippGuide

    - name: krippTable
      title: "Krippendorff's Alpha Results"
      type: Table
      visible: (kripp)
      rows: 1
      columns:
        - name: method
          title: 'Method'
          type: text
        - name: subjects
          title: 'Cases'
          type: integer
        - name: raters
          title: 'Raters'
          type: integer
        - name: alpha
          title: 'Alpha'
          type: number
        - name: ci_lower
          title: 'CI Lower'
          type: number
          visible: (bootstrap)
        - name: ci_upper
          title: 'CI Upper'
          type: number
          visible: (bootstrap)
        - name: interpretation
          title: 'Interpretation'
          type: text
      clearWith:
          - vars
          - krippMethod
          - bootstrap
          - nBoot

    - name: krippExplanation
      title: "About Krippendorff's Alpha"
      type: Html
      visible: (showKrippGuide)
      clearWith:
          - showKrippGuide

    - name: lightKappaTableHeading
      title: Additional Categorical Agreement Measures
      type:  Preformatted
      visible: (lightKappa || showLightKappaGuide || finn || showFinnGuide || kendallW || showKendallWGuide || robinsonA || showRobinsonAGuide)
      clearWith:
          - lightKappa
          - showLightKappaGuide
          - finn
          - showFinnGuide
          - kendallW
          - showKendallWGuide
          - robinsonA
          - showRobinsonAGuide

    - name: lightKappaTable
      title: "Light's Kappa Results"
      type: Table
      visible: (lightKappa)
