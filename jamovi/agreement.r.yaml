    - name:  irrtableHeading
      title: Interrater Reliability
      type:  Preformatted

    - name:  irrtable
      title: 'Interrater Reliability'
      type: Table
      swapRowsColumns: true
      rows:  1
      columns:
        - name: method
          title: 'Method'
          type: text
        - name: subjects
          title: 'Subjects'
          type: integer
        - name: raters
          title: 'Raters'
          type: integer
        - name: peragree
          title: 'Agreement %'
          type: integer
        - name: kappa
          title: 'Kappa'
          type: number
        - name: z
          title: 'z'
          type: number
        - name: p
          title: 'p-value'
          type: number
          format: zto,pvalue
      clearWith:
          - vars
          - wght
          - exct


    - name:  contingencyTableHeading
      title: Data Summary
      type:  Preformatted
      visible: (sft)
      clearWith:
          - sft

    - name:  contingencyTable
      title: 'Contingency Table (2 Raters)'
      type: Table
      visible: (sft)
      rows: 0
      columns: []
      clearWith:
          - vars
          - wght
          - exct

    - name:  ratingCombinationsTable
      title: 'Rating Combinations (3+ Raters)'
      type: Table
      visible: (sft)
      rows: 0
      columns: []
      clearWith:
          - vars
          - wght
          - exct

    - name: contingencyTableExplanation
      title: "About Contingency Table & Rating Combinations"
      type: Html
      visible: (sft && showAbout)

    - name: blandAltmanHeading
      title: Bland-Altman Method Comparison
      type:  Preformatted
      visible: (blandAltmanPlot || showBlandAltmanGuide)
      clearWith:
          - blandAltmanPlot
          - showBlandAltmanGuide

    - name: blandAltman
      title: 'Bland-Altman Plot'
      type: Image
      width: 500
      height: 400
      renderFun: .blandAltman
      visible: (blandAltmanPlot)
      requiresData: true
      clearWith:
          - vars
          - baConfidenceLevel

    - name: agreementHeatmapPlot
      title: 'Agreement Heatmap (Confusion Matrix)'
      type: Image
      width: 600
      height: 500
      renderFun: .agreementHeatmap
      visible: (agreementHeatmap)
      requiresData: true
      clearWith:
          - vars
          - heatmapColorScheme
          - heatmapShowPercentages
          - heatmapShowCounts
          - heatmapAnnotationSize

    - name: agreementHeatmapExplanation
      title: "About Agreement Heatmap"
      type: Html
      visible: (showAgreementHeatmapGuide)
      clearWith:
          - showAgreementHeatmapGuide

    - name: blandAltmanExplanation
      title: "About Bland-Altman Analysis"
      type: Html
      visible: (showBlandAltmanGuide)
      clearWith:
          - showBlandAltmanGuide

    - name: blandAltmanStats
      title: 'Bland-Altman Statistics'
      type: Table
      visible: (blandAltmanPlot)
      rows: 1
      columns:
        - name: meanDiff
          title: 'Mean Difference'
          type: number
        - name: sdDiff
          title: 'SD of Difference'
          type: number
        - name: lowerLoA
          title: 'Lower LoA'
          type: number
        - name: upperLoA
          title: 'Upper LoA'
          type: number
        - name: propBiasP
          title: 'Proportional Bias (p)'
          type: number
          format: zto,pvalue
          visible: (proportionalBias)
        - name: normalityW
          title: 'Shapiro-Wilk W'
          type: number
        - name: normalityP
          title: 'Normality (p)'
          type: number
          format: zto,pvalue
      clearWith:
          - vars
          - baConfidenceLevel
          - proportionalBias





