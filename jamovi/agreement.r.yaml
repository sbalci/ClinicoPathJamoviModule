          type: text
        - name: subjects
          title: 'Cases'
          type: integer
        - name: raters
          title: 'Raters'
          type: integer
        - name: kappa
          title: "Kappa"
          type: number
        - name: p
          title: 'p-value'
          type: number
          format: zto,pvalue
      clearWith:
          - vars

    - name: lightKappaExplanation
      title: "About Light's Kappa"
      type: Html
      visible: (showLightKappaGuide)
      clearWith:
          - showLightKappaGuide

    - name: finnTable
      title: "Finn Coefficient Results (Variance-Based Agreement)"
