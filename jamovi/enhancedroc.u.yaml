title: Clinical ROC Analysis
name: enhancedROC
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome Variable
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
          - type: LevelSelector
            name: positiveClass
            enable: (outcome)
      - type: TargetLayoutBox
        label: Predictor Variables
        children:
          - type: VariablesListBox
            name: predictors
            isTarget: true
            itemDropBehaviour: emptyspace
  - type: CollapseBox
    label: Analysis Options
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Analysis Settings
            children:
              - type: ComboBox
                name: analysisType
              - type: ComboBox
                name: direction
              - type: CheckBox
                name: youdenOptimization
              - type: ComboBox
                name: clinicalContext
              - type: ComboBox
                name: clinicalPresets
          - type: Label
            label: Thresholds & Cutoffs
            children:
              - type: TextBox
                name: sensitivityThreshold
                format: number
              - type: TextBox
                name: specificityThreshold
                format: number
              - type: TextBox
                name: customCutoffs
                format: string
  - type: CollapseBox
    label: Output Options
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: LayoutBox
            cell:
              column: 0
              row: 0
            children:
              - type: Label
                label: Tables
                children:
                  - type: CheckBox
                    name: aucTable
                  - type: CheckBox
                    name: cutoffTable
                  - type: CheckBox
                    name: optimalCutoffs
                  - type: CheckBox
                    name: diagnosticMetrics
                  - type: CheckBox
                    name: clinicalMetrics
          - type: LayoutBox
            cell:
              column: 1
              row: 0
            children:
              - type: Label
                label: Plots
                children:
                  - type: CheckBox
                    name: rocCurve
                  - type: CheckBox
                    name: showCutoffPoints
                    enable: (rocCurve)
                  - type: CheckBox
                    name: showConfidenceBands
                    enable: (rocCurve)
                  - type: ComboBox
                    name: plotTheme
                    enable: (rocCurve)
                  - type: CheckBox
                    name: showMetricsDiff
                  - type: CheckBox
                    name: statisticalComparison
  - type: CollapseBox
    label: Clinical Context & Prevalence
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: LayoutBox
            cell:
              column: 0
              row: 0
            children:
              - type: Label
                label: Disease Prevalence
                children:
                  - type: TextBox
                    name: prevalence
                    format: number
                  - type: CheckBox
                    name: useObservedPrevalence
          - type: LayoutBox
            cell:
              column: 1
              row: 0
            children:
              - type: Label
                label: Reporting Options
                children:
                  - type: CheckBox
                    name: comprehensive_output
                  - type: CheckBox
                    name: clinical_interpretation
  - type: CollapseBox
    label: Statistical Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Confidence Intervals
            children:
              - type: TextBox
                name: confidenceLevel
                suffix: '%'
                format: number
              - type: CheckBox
                name: useBootstrap
              - type: TextBox
                name: bootstrapSamples
                format: number
                enable: (useBootstrap)
              - type: ComboBox
                name: bootstrapMethod
                enable: (useBootstrap)
              - type: CheckBox
                name: stratifiedBootstrap
                enable: (useBootstrap)
              - type: CheckBox
                name: bootstrapCutoffCI
              - type: CheckBox
                name: bootstrapPartialAUC
          - type: Label
            label: ROC Curve Comparisons
            children:
              - type: CheckBox
                name: pairwiseComparisons
              - type: ComboBox
                name: comparisonMethod
                enable: (pairwiseComparisons)
  - type: CollapseBox
    label: Advanced ROC Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Smoothing & Partial AUC
            children:
              - type: ComboBox
                name: smoothMethod
              - type: CheckBox
                name: partialAuc
              - type: ComboBox
                name: partialAucType
                enable: (partialAuc)
              - type: TextBox
                name: partialRange
                format: string
                enable: (partialAuc)
          - type: Label
            label: Curve Analysis
            children:
              - type: CheckBox
                name: convexHull
              - type: ComboBox
                name: tiedScoreHandling
              - type: CheckBox
                name: crocAnalysis
              - type: TextBox
                name: crocAlpha
                format: number
                enable: (crocAnalysis)
  - type: CollapseBox
    label: Class Imbalance Detection
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: detectImbalance
          - type: TextBox
            name: imbalanceThreshold
            format: number
            enable: (detectImbalance)
          - type: CheckBox
            name: showImbalanceWarning
            enable: (detectImbalance)
          - type: CheckBox
            name: recommendPRC
            enable: (detectImbalance)
  - type: CollapseBox
    label: Calibration Analysis
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: LayoutBox
            cell:
              column: 0
              row: 0
            children:
              - type: Label
                label: Calibration Assessment
                children:
                  - type: CheckBox
                    name: calibrationAnalysis
                  - type: CheckBox
                    name: calibrationPlot
                    enable: (calibrationAnalysis)
                  - type: CheckBox
                    name: brierScore
                    enable: (calibrationAnalysis)
                  - type: CheckBox
                    name: calibrationMetrics
                    enable: (calibrationAnalysis)
              - type: LayoutBox
                margin: large
                children:
                  - type: CheckBox
                    name: splineCalibration
                  - type: TextBox
                    name: splineKnots
                    format: number
                    enable: (splineCalibration)
          - type: LayoutBox
            cell:
              column: 1
              row: 0
            children:
              - type: Label
                label: Goodness-of-Fit
                children:
                  - type: CheckBox
                    name: hosmerLemeshow
                    enable: (calibrationAnalysis)
                  - type: TextBox
                    name: hlGroups
                    format: number
                    enable: (calibrationAnalysis && hosmerLemeshow)
                  - type: CheckBox
                    name: eoRatio
                    enable: (calibrationAnalysis)
                  - type: CheckBox
                    name: namDagostino
                    enable: (calibrationAnalysis)
                  - type: CheckBox
                    name: greenwoodNam
                    enable: (calibrationAnalysis)
                  - type: CheckBox
                    name: calibrationBelt
                    enable: (calibrationAnalysis)
                  - type: CheckBox
                    name: calibrationDensity
                    enable: (calibrationAnalysis)
  - type: CollapseBox
    label: Multi-Class ROC
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: multiClassROC
          - type: ComboBox
            name: multiClassStrategy
            enable: (multiClassROC)
          - type: ComboBox
            name: multiClassAveraging
            enable: (multiClassROC)
  - type: CollapseBox
    label: Clinical Impact
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: clinicalImpact
          - type: CheckBox
            name: clinicalUtilityCurve
            enable: (clinicalImpact)
          - type: CheckBox
            name: nntCalculation
          - type: CheckBox
            name: decisionImpactTable
            enable: (clinicalImpact)
          - type: CheckBox
            name: harrellCIndex
          - type: CheckBox
            name: unoCStatistic
          - type: CheckBox
            name: incidentDynamic
          - type: CheckBox
            name: cumulativeDynamic
          - type: CheckBox
            name: competingRisksConcordance
  - type: CollapseBox
    label: Plot Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: plotWidth
            format: number
          - type: TextBox
            name: plotHeight
            format: number
  - type: CollapseBox
    label: Validation & Model Performance
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: LayoutBox
            cell:
              column: 0
              row: 0
            children:
              - type: Label
                label: Internal Validation
                children:
                  - type: CheckBox
                    name: internalValidation
                  - type: ComboBox
                    name: validationMethod
                    enable: (internalValidation)
              - type: LayoutBox
                margin: large
                children:
                  - type: CheckBox
                    name: optimismCorrection
                  - type: CheckBox
                    name: externalValidation
                  - type: CheckBox
                    name: decisionImpactCurves
                  - type: CheckBox
                    name: netBenefitRegression
                  - type: CheckBox
                    name: modelUpdating
                  - type: CheckBox
                    name: transportability
