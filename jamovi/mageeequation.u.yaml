title: Magee Equation - Oncotype DX Estimator
name: mageeequation
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Required Pathology Variables
        children:
          - type: VariablesListBox
            name: nuclearGrade
            maxItemCount: 1
            isTarget: true
            label: Nuclear Grade (1-3)
          - type: VariablesListBox
            name: mitosis
            maxItemCount: 1
            isTarget: true
            label: Mitotic Score (1-3)
          - type: VariablesListBox
            name: erHscore
            maxItemCount: 1
            isTarget: true
            label: ER H-Score / Percentage
          - type: VariablesListBox
            name: prHscore
            maxItemCount: 1
            isTarget: true
            label: PR H-Score / Percentage
          - type: VariablesListBox
            name: her2Status
            maxItemCount: 1
            isTarget: true
            label: HER2 Status
          - type: LevelSelector
            name: her2Positive
            enable: (her2Status)
      - type: TargetLayoutBox
        label: Optional Variables (for extended equations)
        children:
          - type: VariablesListBox
            name: nottinghamScore
            maxItemCount: 1
            isTarget: true
            label: Nottingham Score (3-9)
          - type: VariablesListBox
            name: tumorSize
            maxItemCount: 1
            isTarget: true
            label: Tumor Size (cm)
          - type: VariablesListBox
            name: ki67
            maxItemCount: 1
            isTarget: true
            label: Ki-67 Index (%)
      - type: TargetLayoutBox
        label: Actual RS (for concordance)
        children:
          - type: VariablesListBox
            name: actualRS
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Input Format & Equations
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: erFormat
          - type: ComboBox
            name: prFormat
          - type: ComboBox
            name: equations
  - type: CollapseBox
    label: Risk Cutoffs (TAILORx)
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: lowCutoff
            format: number
          - type: TextBox
            name: highCutoff
            format: number
  - type: CollapseBox
    label: Output Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showIndividual
          - type: CheckBox
            name: showConcordance
          - type: CheckBox
            name: showDistribution
