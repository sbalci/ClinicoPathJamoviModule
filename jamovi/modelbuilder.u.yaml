title: Prediction Model Builder
name: modelbuilder
jus: '3.0'
stage: 0
compilerMode: tame

children:
  # =============================================================================
  # VARIABLE SELECTION - Always visible at top
  # =============================================================================
  - type: VariableSupplier
    persistentItems: true
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label:  Outcome Variable
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomePositive
            label: Positive Outcome Level
            enable: (outcome)

      - type: TargetLayoutBox
        label:  Basic Clinical Variables 
        children:
          - type: VariablesListBox
            name: basicPredictors
            isTarget: true
            height: normal
            
      - type: TargetLayoutBox
        label: + Enhanced Clinical Variables 
        children:
          - type: VariablesListBox
            name: enhancedPredictors
            isTarget: true
            height: normal
            
      - type: TargetLayoutBox
        label:  Biomarker Variables 
        children:
          - type: VariablesListBox
            name: biomarkerPredictors
            isTarget: true
            height: normal
            
      - type: TargetLayoutBox
        label:  Custom Variables 
        children:
          - type: VariablesListBox
            name: customPredictors
            isTarget: true
            height: normal

            
  # =============================================================================
  # CLINICAL PRESETS - Quick setup for common scenarios  
  # =============================================================================
  - type: CollapseBox
    label:  Clinical Presets (Quick Setup)
    margin: normal
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Predefined Clinical Scenarios
            children:
              - type: ComboBox
                name: clinicalPreset
                label: Choose a clinical preset for optimized settings
                



  # =============================================================================
  # DATA PREPARATION - Essential setup
  # =============================================================================
  - type: CollapseBox
    label:  Data Preparation
    margin: normal
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Data Splitting
            children:
              - type: CheckBox
                name: splitData
                label: Split data for validation (training 70% / testing 30%)
              - type: TextBox
                name: randomSeed
                format: number
                label: Random seed (for reproducibility)
                enable: (splitData)
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Missing Data Handling
            children:
              - type: ComboBox
                name: missingDataMethod
                label: Missing data strategy
              - type: TextBox
                name: imputationSets
                format: number
                label: Number of imputation sets
                enable: (missingDataMethod:multiple_imputation)

  # =============================================================================
  # MODEL SELECTION - Core functionality
  # =============================================================================
  - type: CollapseBox
    label:  Model Types to Build
    margin: normal
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Basic Clinical Model
            children:
              - type: CheckBox
                name: buildBasicModel
                label: Build basic clinical model (uses Basic Clinical Variables above)
              - type: TextBox
                name: basicModelName
                format: string
                label: Model display name
                enable: (buildBasicModel)

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: + Enhanced Clinical Model
            children:
              - type: CheckBox
                name: buildEnhancedModel
                label: Build enhanced clinical model (uses Enhanced Clinical Variables above)
              - type: TextBox
                name: enhancedModelName
                format: string
                label: Model display name
                enable: (buildEnhancedModel)

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Biomarker Model
            children:
              - type: CheckBox
                name: buildBiomarkerModel
                label: Build biomarker model (uses Biomarker Variables above)
              - type: TextBox
                name: biomarkerModelName
                format: string
                label: Model display name
                enable: (buildBiomarkerModel)

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Custom Model
            children:
              - type: CheckBox
                name: buildCustomModel
                label: Build custom model (uses Custom Variables above)
              - type: TextBox
                name: customModelName
                format: string
                label: Model display name
                enable: (buildCustomModel)

  # =============================================================================
  # MODELING METHOD - Algorithm selection
  # =============================================================================
  - type: CollapseBox
    label:  Modeling Method
    margin: normal
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Regression Type
            children:
              - type: CheckBox
                name: penalizedRegression
                label: Use penalized regression (for high-dimensional data)
              - type: ComboBox
                name: penaltyType
                label: Penalty method
                enable: (penalizedRegression)

  # =============================================================================
  # FEATURE ENGINEERING - Advanced preprocessing
  # =============================================================================
  - type: CollapseBox
    label:  Feature Engineering
    margin: normal
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Variable Transformations
            children:
              - type: CheckBox
                name: transformVariables
                label: Transform continuous variables
              - type: ComboBox
                name: transformMethod
                label: Transformation type
                enable: (transformVariables)
      
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Variable Interactions
            children:
              - type: CheckBox
                name: includeInteractions
                label: Include interaction terms
              - type: TextBox
                name: interactionTerms
                format: string
                label: Specific interactions (e.g., age*sex, bmi*diabetes)
                enable: (includeInteractions)

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Variable Selection
            children:
              - type: CheckBox
                name: useStepwise
                label: Automatic variable selection
              - type: ComboBox
                name: stepwiseDirection
                label: Selection method
                enable: (useStepwise)
              - type: ComboBox
                name: selectionCriterion
                label: Selection criterion
                enable: (useStepwise)

  # =============================================================================
  # MODEL VALIDATION - Performance assessment
  # =============================================================================
  - type: CollapseBox
    label:  Model Validation
    margin: normal
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Cross-Validation
            children:
              - type: CheckBox
                name: crossValidation
                label: Perform k-fold cross-validation
              - type: TextBox
                name: cvFolds
                format: number
                label: Number of folds
                enable: (crossValidation)

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Bootstrap Validation
            children:
              - type: CheckBox
                name: bootstrapValidation
                label: Perform bootstrap validation
              - type: TextBox
                name: bootstrapReps
                format: number
                label: Bootstrap replications
                enable: (bootstrapValidation)

  # =============================================================================
  # MODEL COMPARISON - Advanced metrics
  # =============================================================================
  - type: CollapseBox
    label:  Model Comparison
    margin: normal
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Improvement Metrics
            children:
              - type: CheckBox
                name: calculateNRI
                label: Net Reclassification Index (NRI)
              - type: TextBox
                name: nriThresholds
                format: string
                label: Risk thresholds (e.g., 0.10, 0.20)
                enable: (calculateNRI)
              - type: CheckBox
                name: calculateIDI
                label: Integrated Discrimination Index (IDI)

  # =============================================================================
  # OUTPUT OPTIONS - What to display/export
  # =============================================================================
  - type: CollapseBox
    label:  Output Options
    margin: normal
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Tables & Performance
            children:
              - type: CheckBox
                name: showModelSummary
                label: Show model coefficients and statistics
              - type: CheckBox
                name: showPerformanceMetrics
                label: Show performance metrics (AUC, calibration, etc.)
              - type: CheckBox
                name: compareModels
                label: Model comparison table

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Plots & Visualizations
            children:
              - type: CheckBox
                name: showROCCurves
                label: ROC curves for discrimination
              - type: CheckBox
                name: showCalibrationPlots
                label: Calibration plots for reliability

      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Data Export & Integration
            children:
              - type: CheckBox
                name: createPredictions
                label: Add predictions to dataset (for further analysis)
              - type: CheckBox
                name: exportForDCA
                label: Prepare for Decision Curve Analysis

  # =============================================================================
  # CLINICAL RISK SCORE - Practical application
  # =============================================================================
  - type: CollapseBox
    label:  Clinical Risk Score
    margin: normal
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label:  Risk Score Generation
            children:
              - type: CheckBox
                name: generateRiskScore
                label: Generate clinical risk score for bedside use
              - type: ComboBox
                name: riskScorePoints
                label: Point system complexity
                enable: (generateRiskScore)