title: Enhanced ROC Analysis
name: timeroc
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Time Elapsed
        children:
          - type: VariablesListBox
            name: elapsedtime
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Outcome
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: LevelSelector
        name: outcomeLevel
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Marker Variable
        children:
          - type: VariablesListBox
            name: marker
            maxItemCount: 1
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: analysisType

  - type: CollapseBox
    label: Analysis Options
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: timepoints
            format: string
          - type: ComboBox
            name: method
          - type: ComboBox
            name: timetypeoutput
          - type: CheckBox
            name: bootstrapCI

  - type: CollapseBox
    label: Output Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: plotROC
          - type: CheckBox
            name: plotAUC
          - type: CheckBox
            name: smoothAUC
            enable: (plotAUC)
          - type: CheckBox
            name: showOptimalCutoff
          - type: CheckBox
            name: showMarkerStats
          - type: CheckBox
            name: compareBaseline
          - type: CheckBox
            name: youdenIndex

  - type: CollapseBox
    label: ROC Comparison
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: compareROCs
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Multiple Markers (for comparison)
            children:
              - type: VariablesListBox
                name: markers
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: rocComparison
