title: LASSO Logistic Regression
name: lassologistic
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Binary Outcome
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomeLevel
            enable: (outcome)
      - type: TargetLayoutBox
        label: Explanatory Variables
        children:
          - type: VariablesListBox
            name: explanatory
            isTarget: true
  - type: CollapseBox
    label: Data Suitability
    collapsed: false
    stretchFactor: 1
    children:
      - type: CheckBox
        name: suitabilityCheck
  - type: CollapseBox
    label: Model Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Penalty Type
        children:
          - type: ComboBox
            name: penalty
          - type: TextBox
            name: alpha
            format: number
            enable: (penalty == 'elasticnet')
      - type: Label
        label: Lambda Selection
        children:
          - type: ComboBox
            name: lambda
      - type: Label
        label: Cross-validation
        children:
          - type: TextBox
            name: nfolds
            format: number
      - type: CheckBox
        name: standardize
  - type: CollapseBox
    label: Validation
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: bootstrapValidation
      - type: TextBox
        name: bootstrapN
        format: number
        enable: (bootstrapValidation)
  - type: CollapseBox
    label: Scoring System
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: scoringSystem
      - type: ComboBox
        name: scoringMethod
        enable: (scoringSystem)
      - type: TextBox
        name: scoringMaxPoints
        format: number
        enable: (scoringSystem)
      - type: CheckBox
        name: scoreLookupTable
        enable: (scoringSystem)
  - type: CollapseBox
    label: Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: cv_plot
      - type: CheckBox
        name: coef_plot
      - type: CheckBox
        name: roc_plot
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: random_seed
        format: number
  - type: CollapseBox
    label: Output Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: Label
        label: Save Variables
        children:
          - type: Output
            name: predictions
  - type: CollapseBox
    label: Explanatory Output
    collapsed: true
    stretchFactor: 1
    children:
      - type: CheckBox
        name: showSummary
      - type: CheckBox
        name: showExplanations
      - type: CheckBox
        name: showMethodologyNotes
      - type: CheckBox
        name: includeClinicalGuidance
      - type: CheckBox
        name: showVariableImportance
      - type: CheckBox
        name: showModelComparison
