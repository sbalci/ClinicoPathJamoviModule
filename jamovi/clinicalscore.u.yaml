title: Clinical Scoring System Generator
name: clinicalscore
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome Variable
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomeLevel
            enable: (outcome)
      - type: TargetLayoutBox
        label: Predictor Variables
        children:
          - type: VariablesListBox
            name: explanatory
            isTarget: true
      - type: TargetLayoutBox
        label: Time Variable (Cox only)
        children:
          - type: VariablesListBox
            name: elapsedtime
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Model & Scoring
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: modelType
          - type: ComboBox
            name: scoringMethod
          - type: TextBox
            name: maxPoints
            format: number
  - type: CollapseBox
    label: Variable Categorization
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: autoCategorize
          - type: ComboBox
            name: categorizeMethod
            enable: (autoCategorize)
          - type: TextBox
            name: customBreaks
            format: string
            enable: (autoCategorize && categorizeMethod == 'manual')
  - type: CollapseBox
    label: Validation
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: suitabilityCheck
          - type: CheckBox
            name: bootstrapValidation
          - type: TextBox
            name: bootstrapN
            format: number
            enable: (bootstrapValidation)
  - type: CollapseBox
    label: Output Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: scoreLookup
          - type: CheckBox
            name: showNomogram
          - type: CheckBox
            name: showCalibration
          - type: TextBox
            name: calibrationGroups
            format: number
            enable: (showCalibration)
          - type: CheckBox
            name: showDiscrimination
          - type: CheckBox
            name: showDecisionCurve
          - type: CheckBox
            name: showTRIPOD
  - type: CollapseBox
    label: Explanatory Output
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showSummary
          - type: CheckBox
            name: showExplanations
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: random_seed
        format: number
