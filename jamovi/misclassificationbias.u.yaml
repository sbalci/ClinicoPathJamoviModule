title: Misclassification Bias Sensitivity Analysis
name: misclassificationbias
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome Variable
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomeLevel
            enable: (outcome)
      - type: TargetLayoutBox
        label: Exposure / Classifier Variable
        children:
          - type: VariablesListBox
            name: exposure
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: exposureLevel
            enable: (exposure)
  - type: CollapseBox
    label: Classification Error Parameters
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: misclassType
          - type: TextBox
            name: senExposure
            format: number
            enable: (misclassType == 'nondifferential')
          - type: TextBox
            name: specExposure
            format: number
            enable: (misclassType == 'nondifferential')
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: senExposureCase
            format: number
            enable: (misclassType == 'differential')
          - type: TextBox
            name: specExposureCase
            format: number
            enable: (misclassType == 'differential')
          - type: TextBox
            name: senExposureControl
            format: number
            enable: (misclassType == 'differential')
          - type: TextBox
            name: specExposureControl
            format: number
            enable: (misclassType == 'differential')
  - type: CollapseBox
    label: Analysis Options
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: effectMeasure
  - type: CollapseBox
    label: Sensitivity Range Analysis
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: rangeAnalysis
          - type: TextBox
            name: senRange
            format: string
            enable: (rangeAnalysis)
          - type: TextBox
            name: specRange
            format: string
            enable: (rangeAnalysis)
  - type: CollapseBox
    label: Simulation Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: nSimulations
            format: number
          - type: TextBox
            name: random_seed
            format: number
