title: Leave-One-Center-Out Cross-Validation
name: leaveonecenterout
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Outcome Variable
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomeLevel
            enable: (outcome)
      - type: TargetLayoutBox
        label: Predictor Variables
        children:
          - type: VariablesListBox
            name: predictors
            isTarget: true
      - type: TargetLayoutBox
        label: Center / Institution Variable
        children:
          - type: VariablesListBox
            name: centerVariable
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Time Variable (Cox only)
        children:
          - type: VariablesListBox
            name: elapsedtime
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Model Options
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: modelType
          - type: CheckBox
            name: useLasso
          - type: ComboBox
            name: lambdaMethod
            enable: (useLasso)
  - type: CollapseBox
    label: Output Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: pooledPerformance
          - type: CheckBox
            name: forestPlot
          - type: CheckBox
            name: calibrationCheck
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: random_seed
        format: number
