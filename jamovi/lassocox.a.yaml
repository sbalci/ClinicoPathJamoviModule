---
name: lassocox
title: Lasso-Cox Regression
menuGroup: SurvivalT
menuSubgroup: Penalized Cox Regression
menuTitle: LASSO Cox
menuSubtitle: Baseline feature screening. Automatically drops irrelevant predictors.
version: '0.0.3'
jas: '1.2'

description:
    main: Performs Lasso-penalized Cox regression for variable selection in survival analysis.
    R:
        dontrun: true
        usage: |
            lassocox(data = data, elapsedtime = "Time", outcome = "Status",
                outcomeLevel = "1", explanatory = vars(age, stage, grade))

options:
    - name: data
      type: Data
      description:
          R: The data as a data frame.

    - name: elapsedtime
      title: 'Time Elapsed'
      type: Variable
      suggested: [ continuous ]
      permitted: [ numeric ]
      description:
        R: >
          The numeric variable representing follow-up time until the event or last observation.

    - name: outcome
      title: 'Outcome'
      type: Variable
      suggested: [ ordinal, nominal ]
      permitted: [ factor, numeric ]
      description:
        R: >
          Binary event indicator variable (event vs censored). Can be factor or
          numeric with exactly two observed values.

    - name: outcomeLevel
      title: Event Level
      type: Level
      variable: (outcome)
      description:
        R: >
          Level of `outcome` considered as the event. For binary factor outcomes,
          if left empty the second observed level is used; for numeric binary
          outcomes, the larger observed value is used (or 1 for 0/1 coding).

    - name: censorLevel
      title: Censored Level
      type: Level
      variable: (outcome)
      description:
        R: >
          Level of `outcome` considered as censored (no event). Together with
          `outcomeLevel`, this defines a strict two-level encoding: rows whose
          outcome matches neither level are treated as missing and excluded.

    - name: explanatory
      title: Explanatory Variables
      type: Variables
      suggested: [ nominal, ordinal, continuous ]
      permitted: [ factor, numeric ]
      description:
        R: >
          Variables to be considered for selection in the Lasso-Cox regression.
          Constant variables are removed automatically before fitting.
      
    - name: lambda
      title: Lambda Selection Method
      type: List
      options:
        - title: Minimum CV Error
          name: lambda.min
        - title: 1SE Rule
          name: lambda.1se
      default: lambda.1se
      description:
        R: >
          Method for selecting the optimal lambda parameter from cross-validation.

    - name: nfolds
      title: Number of CV Folds
      type: Integer
      default: 10
      min: 3
      description:
        R: >
          Number of folds for cross-validation. Fold count is reduced
          automatically when sample size is limited.

    - name: random_seed
      title: Random Seed
      type: Integer
      default: 123456
      min: 1
      max: 999999
      description:
        R: >
          Random seed for reproducible cross-validation fold assignment.
      
    - name: standardize
      title: Standardize Variables
      type: Bool
      default: true
      description:
        R: >
          Whether to standardize predictor variables before fitting. If enabled,
          reported coefficients are on the standardized predictor scale.

    - name: suitabilityCheck
      title: Data Suitability Assessment
      type: Bool
      default: true
      description:
        R: >
          Run a comprehensive data suitability assessment before LASSO analysis.
          Checks sample size, events-per-variable ratio, multicollinearity,
          and whether regularization is needed.

    - name: cv_plot
      title: Cross-validation Plot
      type: Bool
      default: true
      description:
        R: >
          Whether to show the cross-validation plot.

    - name: coef_plot
      title: Coefficient Plot
      type: Bool
      default: true
      description:
        R: >
          Whether to show a bar plot of selected-variable coefficients at the
          chosen lambda value.

    - name: survival_plot
      title: Risk Group Survival Plot
      type: Bool
      default: true
      description:
        R: >
          Whether to show survival curves by risk groups. Uses `survminer`
          if available, with a base-R fallback otherwise.

    - name: riskScore
      title: Add Risk Score to Data
      type: Output
      description:
        R: >
          Adds calculated risk scores to the dataset (complete cases only;
          excluded rows receive missing values).

    # Explanatory Output Options
    - name: showSummary
      title: Show Results Summary
      type: Bool
      default: false
      description:
        R: >
          Display a natural-language summary paragraph of the main results,
          suitable for copying into reports or manuscripts.

    - name: showExplanations
      title: Show Method Explanations
      type: Bool
      default: false
      description:
        R: >
          Display detailed explanations of LASSO Cox regression methodology,
          including regularization concepts and interpretation guidance.

    - name: showMethodologyNotes
      title: Detailed Methodology Notes
      type: Bool
      default: false
      description:
        R: >
          Show comprehensive technical notes about LASSO regularization,
          cross-validation, and variable selection process.

    - name: includeClinicalGuidance
      title: Clinical Interpretation Guidance
      type: Bool
      default: false
      description:
        R: >
          Include guidance for clinical interpretation of LASSO Cox regression
          results, risk scores, and variable selection outcomes.

    - name: showVariableImportance
      title: Variable Importance Analysis
      type: Bool
      default: false
      description:
        R: >
          Display analysis of variable importance rankings and selection
          patterns across different lambda values.

    - name: showModelComparison
      title: Model Comparison Analysis
      type: Bool
      default: false
      description:
        R: >
          Compare post-LASSO Cox refit (selected variables) with standard Cox
          using all encoded predictors. Intended as an exploratory comparison.

...
