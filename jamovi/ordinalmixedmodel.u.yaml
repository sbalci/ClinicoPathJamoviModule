title: Ordinal Mixed Models (Cumulative Link)
name: ordinalmixedmodel
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Dependent Variable (Ordinal)
        children:
          - type: VariablesListBox
            name: dep
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Fixed Factors
        children:
          - type: VariablesListBox
            name: fixedFactors
            isTarget: true
      - type: TargetLayoutBox
        label: Fixed Covariates
        children:
          - type: VariablesListBox
            name: fixedCovs
            isTarget: true
      - type: TargetLayoutBox
        label: Random Effects Grouping
        children:
          - type: VariablesListBox
            name: randomTerms
            isTarget: true
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: CollapseBox
        label: Model Options
        collapsed: false
        stretchFactor: 1
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: link
              - type: ComboBox
                name: threshold
              - type: TextBox
                name: confLevel
                format: number
      - type: CollapseBox
        label: Output Options
        collapsed: true
        stretchFactor: 1
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: propOddsTest
              - type: CheckBox
                name: oddsRatios
              - type: CheckBox
                name: confInt
              - type: CheckBox
                name: randomEffectsTable
              - type: CheckBox
                name: thresholdsTable
              - type: CheckBox
                name: modelFit
              - type: CheckBox
                name: conditionMeans
