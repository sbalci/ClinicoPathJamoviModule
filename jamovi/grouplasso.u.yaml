title: Group LASSO for Survival Analysis
name: grouplasso
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Time Variable
        children:
          - type: VariablesListBox
            name: time
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Event Indicator
        children:
          - type: VariablesListBox
            name: event
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomeLevel
            enable: (event)
          - type: LevelSelector
            name: censorLevel
            enable: (event)
      - type: TargetLayoutBox
        label: Predictor Variables
        children:
          - type: VariablesListBox
            name: predictors
            isTarget: true

  - type: CollapseBox
    label: Data Suitability
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: suitabilityCheck

  - type: CollapseBox
    label: Group Definition
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: group_definition
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: group_structure
            format: string
            enable: (group_definition:custom)
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: factor_grouping

  - type: CollapseBox
    label: Penalty Options
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: penalty_type
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: group_weights
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: custom_weights
            format: string
            enable: (group_weights:custom)
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: adaptive_weights_method
            enable: (penalty_type:adaptive_group)

  - type: CollapseBox
    label: Cross-Validation
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: cv_folds
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: n_lambda
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: lambda_min_ratio
            format: number

  - type: CollapseBox
    label: Advanced Validation
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: stability_selection
          - type: TextBox
            name: bootstrap_samples
            format: number
            enable: (stability_selection)
          - type: TextBox
            name: stability_threshold
            format: number
            enable: (stability_selection)
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: nested_cv
          - type: TextBox
            name: inner_cv_folds
            format: number
            enable: (nested_cv)
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: permutation_test
          - type: TextBox
            name: n_permutations
            format: number
            enable: (permutation_test)

  - type: CollapseBox
    label: Output Options
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Tables
            children:
              - type: CheckBox
                name: show_group_summary
              - type: CheckBox
                name: show_coefficients
              - type: CheckBox
                name: show_path_summary
              - type: CheckBox
                name: show_cv_results
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Plots
            children:
              - type: CheckBox
                name: plot_regularization_path
              - type: CheckBox
                name: plot_cv_curve
              - type: CheckBox
                name: plot_group_importance
              - type: CheckBox
                name: plot_stability
              - type: CheckBox
                name: plot_group_structure

  - type: CollapseBox
    label: Advanced Settings
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: max_iterations
            format: number
          - type: TextBox
            name: tolerance
            format: number
          - type: TextBox
            name: selection_threshold
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: standardize
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: random_seed
            format: number
