---
name: mageeequation
title: Magee Equation - Oncotype DX Estimator
menuGroup: meddecideT
menuSubgroup: Prediction Models
menuTitle: Magee Equation (Oncotype DX)
menuSubtitle: Estimate Oncotype DX Recurrence Score from pathology variables
version: '0.0.37'
jas: '1.2'

description:
    main: |
        Implements the Magee Equations (Klein et al. 2013, PMID: 23503643) for
        estimating Oncotype DX Recurrence Score from standard pathology variables.
        Provides all four published equations (Original + 3 new) with risk
        category classification and concordance analysis.
    R:
        dontrun: true
        usage: |
            mageeequation(data = data, nuclearGrade = nucgrade,
                mitosis = mitotic_score, erHscore = er_hscore,
                prHscore = pr_hscore, her2Status = her2)

options:
    - name: data
      type: Data

    # ── Required pathology variables ────────────────────────────────
    - name: nuclearGrade
      title: Nuclear Grade (1-3)
      type: Variable
      suggested: [ordinal, continuous]
      permitted: [factor, numeric]

    - name: mitosis
      title: Mitotic Score (1-3)
      type: Variable
      suggested: [ordinal, continuous]
      permitted: [factor, numeric]

    - name: erHscore
      title: ER H-Score (0-300) or Percentage (0-100)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]

    - name: prHscore
      title: PR H-Score (0-300) or Percentage (0-100)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]

    - name: her2Status
      title: HER2 Status
      type: Variable
      suggested: [nominal]
      permitted: [factor, numeric]

    - name: her2Positive
      title: HER2 Positive Level
      type: Level
      variable: (her2Status)

    # ── Optional variables for extended equations ───────────────────
    - name: nottinghamScore
      title: Nottingham Score (3-9)
      type: Variable
      suggested: [ordinal, continuous]
      permitted: [factor, numeric]
      default: null

    - name: tumorSize
      title: Tumor Size (cm)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]
      default: null

    - name: ki67
      title: Ki-67 Index (%)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]
      default: null

    # ── Actual RS for concordance ───────────────────────────────────
    - name: actualRS
      title: Actual Oncotype DX RS (if available)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]
      default: null

    # ── Input format options ────────────────────────────────────────
    - name: erFormat
      title: ER Input Format
      type: List
      options:
        - title: "H-Score (0-300)"
          name: hscore
        - title: "Percentage (0-100)"
          name: percentage
      default: hscore

    - name: prFormat
      title: PR Input Format
      type: List
      options:
        - title: "H-Score (0-300)"
          name: hscore
        - title: "Percentage (0-100)"
          name: percentage
      default: hscore

    # ── Equation selection ──────────────────────────────────────────
    - name: equations
      title: Equations to Calculate
      type: List
      options:
        - title: "All Available Equations"
          name: all
        - title: "Original Equation Only"
          name: original
        - title: "New Equations Only (1-3)"
          name: new_only
      default: all

    # ── Risk cutoffs (TAILORx) ──────────────────────────────────────
    - name: lowCutoff
      title: Low Risk Cutoff (RS <=)
      type: Integer
      default: 15
      min: 0
      max: 100

    - name: highCutoff
      title: High Risk Cutoff (RS >=)
      type: Integer
      default: 26
      min: 0
      max: 100

    # ── Output options ──────────────────────────────────────────────
    - name: showIndividual
      title: Show Individual Patient Scores
      type: Bool
      default: true

    - name: showConcordance
      title: Concordance Analysis (requires actual RS)
      type: Bool
      default: true

    - name: showDistribution
      title: Show Score Distribution Plot
      type: Bool
      default: true

...
