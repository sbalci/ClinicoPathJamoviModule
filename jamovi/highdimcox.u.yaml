title: High-Dimensional Cox Regression
name: highdimcox
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Time Variable
        children:
          - type: VariablesListBox
            name: elapsedtime
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        label: Event Variable
        children:
          - type: VariablesListBox
            name: outcome
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        label: High-Dimensional Predictors
        children:
          - type: VariablesListBox
            name: predictors
            isTarget: true
            itemDropBehaviour: insert
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Outcome Variable Options
        style: list-inline
        children:
          - type: ComboBox
            name: outcomeLevel
            label: Event Level
          - type: ComboBox
            name: censorLevel
            label: Censored Level
  - type: CollapseBox
    label: Data Suitability
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: suitabilityCheck
  - type: CollapseBox
    label: Regularization Settings
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: regularization_method
            label: Regularization Method
          - type: TextBox
            name: alpha_value
            format: number
            label: Elastic Net Alpha (0=Ridge, 1=LASSO)
            enable: (regularization_method:elastic_net)
          - type: ComboBox
            name: cv_method
            label: Cross-Validation Method
          - type: TextBox
            name: cv_folds
            format: number
            label: Number of CV Folds
  - type: CollapseBox
    label: Stability Selection
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: stability_selection
            label: Perform Stability Selection
          - type: TextBox
            name: subsampling_iterations
            format: number
            label: Subsampling Iterations
            enable: (stability_selection)
          - type: TextBox
            name: subsampling_ratio
            format: number
            label: Subsampling Ratio (0.1–0.9)
            enable: (stability_selection)
          - type: TextBox
            name: stability_threshold
            format: number
            label: Stability Threshold
            enable: (stability_selection)
  - type: CollapseBox
    label: Display Options
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: show_regularization_path
            label: Show Regularization Path
          - type: CheckBox
            name: show_cv_plot
            label: Show Cross-Validation Plot
          - type: CheckBox
            name: show_variable_importance
            label: Show Variable Importance
          - type: CheckBox
            name: show_coefficients_table
            label: Show Coefficients Table
          - type: CheckBox
            name: show_model_diagnostics
            label: Show Model Diagnostics
          - type: CheckBox
            name: showSummaries
            label: Analysis Summaries
          - type: CheckBox
            name: showExplanations
            label: Method Explanations
