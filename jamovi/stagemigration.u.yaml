title: Advanced TNM Stage Migration Analysis
name: stagemigration
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: ⭐ Original Staging System
        children:
          - type: VariablesListBox
            name: oldStage
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: ⭐ New Staging System
        children:
          - type: VariablesListBox
            name: newStage
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: ⭐ Survival Time (months)
        children:
          - type: VariablesListBox
            name: survivalTime
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: ⭐ Event Indicator
        children:
          - type: VariablesListBox
            name: event
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: eventLevel
            label: Event Level (auto-detected if blank)
  - type: CollapseBox
    label: 📊 Analysis Configuration
    collapsed: false
    children:
      - type: Label
        label: Analysis Mode
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: complexityMode
                label: Complexity Mode
              - type: Label
                label: 'Quick: Matrix + C-index (5-10 min)'
              - type: Label
                label: 'Standard: + NRI, curves, tests (15-20 min)'
              - type: Label
                label: 'Comprehensive: + Bootstrap, ROC, DCA (30+ min)'
      - type: Label
        label: Clinical Context
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: cancerType
                label: Cancer Type
              - type: ComboBox
                name: preferredLanguage
                label: Report Language
              - type: TextBox
                name: confidenceLevel
                label: Confidence Level (%)
                format: number
      - type: Label
        label: Presets & Settings
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: clinicalPreset
                label: Clinical Preset
              - type: ComboBox
                name: analysisType
                label: Analysis Type
              - type: CheckBox
                name: useOptimismCorrection
                label: Use Optimism Correction
  - type: CollapseBox
    label: 📋 Basic Outputs
    collapsed: false
    children:
      - type: Label
        label: Essential Tables
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: showMigrationOverview
                label: ✓ Overview Summary
              - type: CheckBox
                name: showMigrationMatrix
                label: ✓ Migration Matrix
              - type: CheckBox
                name: showStageDistribution
                label: ✓ Stage Distribution
              - type: CheckBox
                name: showMigrationSummary
                label: ✓ Migration Summary
              - type: CheckBox
                name: showStatisticalComparison
                label: ✓ C-index Comparison
      - type: Label
        label: Interpretation & Reports
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: showExplanations
                label: 📖 Show Explanations
              - type: CheckBox
                name: generateCopyReadyReport
                label: 📄 Copy-Ready Summary
              - type: CheckBox
                name: showAbbreviationGlossary
                label: 📚 Abbreviation Glossary
              - type: CheckBox
                name: generateExecutiveSummary
                label: 📊 Executive Summary
  - type: CollapseBox
    label: 📈 Discrimination & Validation
    collapsed: true
    children:
      - type: Label
        label: Discrimination Metrics
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: showConcordanceComparison
                label: Detailed Concordance Comparison
              - type: CheckBox
                name: calculateNRI
                label: Net Reclassification Improvement (NRI)
              - type: TextBox
                name: nriTimePoints
                label: '  NRI Time Points (months, comma-separated)'
                format: string
                enable: (calculateNRI)
              - type: TextBox
                name: nriClinicalThreshold
                label: '  Clinical Threshold'
                format: number
                enable: (calculateNRI)
              - type: CheckBox
                name: calculateIDI
                label: Integrated Discrimination Improvement (IDI)
              - type: CheckBox
                name: calculatePseudoR2
                label: Pseudo R-squared Measures
              - type: CheckBox
                name: calculateSME
                label: Stage Migration Effect (SME)
      - type: Label
        label: ROC Analysis
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performROCAnalysis
                label: Time-Dependent ROC Analysis
              - type: TextBox
                name: rocTimePoints
                label: '  Time Points (months, comma-separated)'
                format: string
                enable: (performROCAnalysis)
              - type: CheckBox
                name: showROCComparison
                label: '  Show ROC Comparison Plot'
                enable: (performROCAnalysis)
      - type: Label
        label: Validation Methods
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performBootstrap
                label: Bootstrap Validation
              - type: TextBox
                name: bootstrapReps
                label: '  Repetitions'
                format: number
                enable: (performBootstrap)
              - type: CheckBox
                name: performCrossValidation
                label: Cross-Validation
              - type: TextBox
                name: cvFolds
                label: '  Number of Folds'
                format: number
                enable: (performCrossValidation)
      - type: Label
        label: Display Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: showConfidenceIntervals
                label: Show Confidence Intervals
              - type: CheckBox
                name: includeEffectSizes
                label: Include Effect Sizes
  - type: CollapseBox
    label: 🔄 Survival Analysis
    collapsed: true
    children:
      - type: Label
        label: Survival Curves
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: showSurvivalCurves
                label: Kaplan-Meier Curves
              - type: ComboBox
                name: survivalPlotType
                label: '  Plot Layout'
                enable: (showSurvivalCurves)
              - type: CheckBox
                name: showRiskTables
                label: '  Include Risk Tables'
                enable: (showSurvivalCurves)
      - type: Label
        label: Statistical Tests
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performHomogeneityTests
                label: Stage Homogeneity Tests
              - type: CheckBox
                name: performTrendTests
                label: Linear Trend Tests
              - type: CheckBox
                name: performLikelihoodTests
                label: Likelihood Ratio Tests
      - type: Label
        label: Will Rogers Phenomenon
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: advancedMigrationAnalysis
                label: Will Rogers Detection
              - type: CheckBox
                name: showWillRogersVisualization
                label: '  Visualizations'
                enable: (advancedMigrationAnalysis)
              - type: CheckBox
                name: showWillRogersAnalysis
                label: '  Detailed Tables'
                enable: (advancedMigrationAnalysis)
  - type: CollapseBox
    label: 🧮 Multifactorial Analysis
    collapsed: true
    children:
      - type: Label
        label: Enable Covariate Adjustment
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: enableMultifactorialAnalysis
                label: Enable Multifactorial Analysis
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Continuous Covariates
            children:
              - type: VariablesListBox
                name: continuousCovariates
                isTarget: true
          - type: TargetLayoutBox
            label: Categorical Covariates
            children:
              - type: VariablesListBox
                name: categoricalCovariates
                isTarget: true
          - type: TargetLayoutBox
            label: Institution Variable (optional)
            children:
              - type: VariablesListBox
                name: institutionVariable
                maxItemCount: 1
                isTarget: true
      - type: Label
        label: Analysis Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: multifactorialComparisonType
                label: Comparison Type
                enable: (enableMultifactorialAnalysis)
              - type: CheckBox
                name: showMultifactorialTables
                label: Show Tables
                enable: (enableMultifactorialAnalysis)
              - type: CheckBox
                name: showAdjustedCIndexComparison
                label: Adjusted C-Index
                enable: (enableMultifactorialAnalysis)
              - type: CheckBox
                name: showNestedModelTests
                label: Nested Model Tests
                enable: (enableMultifactorialAnalysis)
              - type: CheckBox
                name: showStepwiseResults
                label: Stepwise Selection
                enable: (enableMultifactorialAnalysis)
              - type: CheckBox
                name: performInteractionTests
                label: Interaction Tests
                enable: (enableMultifactorialAnalysis)
              - type: CheckBox
                name: stratifiedAnalysis
                label: Stratified Analysis
                enable: (enableMultifactorialAnalysis)
  - type: CollapseBox
    label: 🎯 Competing Risks Analysis
    collapsed: true
    children:
      - type: Label
        label: Enable Competing Risks
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performCompetingRisks
                label: Enable Competing Risks Analysis
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Competing Event Variable
            children:
              - type: VariablesListBox
                name: competingEventVar
                maxItemCount: 1
                isTarget: true
          - type: TargetLayoutBox
            label: Covariates (optional)
            children:
              - type: VariablesListBox
                name: competingRisksCovariates
                isTarget: true
      - type: Label
        label: Analysis Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: competingRisksMethod
                label: Analysis Method
                enable: (performCompetingRisks)
              - type: TextBox
                name: competingEventLevels
                label: Event Levels (comma-separated)
                format: string
                enable: (performCompetingRisks)
              - type: TextBox
                name: primaryEventLevel
                label: Primary Event Level
                format: string
                enable: (performCompetingRisks)
              - type: CheckBox
                name: performGrayTest
                label: Gray's Test
                enable: (performCompetingRisks)
              - type: CheckBox
                name: stratifyByStaging
                label: Stratify by Stage
                enable: (performCompetingRisks)
              - type: CheckBox
                name: calculateCRCIndex
                label: CR C-Index
                enable: (performCompetingRisks)
              - type: CheckBox
                name: generateCRSummary
      - type: Label
        label: Visualization
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: generateCIFPlots
                label: Cumulative Incidence Plots
                enable: (performCompetingRisks)
              - type: TextBox
                name: cifTimePoints
                label: '  Time Points (months)'
                format: string
                enable: (generateCIFPlots)
              - type: TextBox
                name: cifConfidenceLevel
                label: '  Confidence Level (%)'
                format: number
                enable: (generateCIFPlots)
  - type: CollapseBox
    label: 💊 Clinical Utility Analysis
    collapsed: true
    children:
      - type: Label
        label: Decision Analysis
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performDCA
                label: Decision Curve Analysis (DCA)
              - type: CheckBox
                name: performCalibration
                label: Calibration Analysis
              - type: CheckBox
                name: showCalibrationPlots
                label: '  Calibration Plots'
                enable: (performCalibration)
              - type: CheckBox
                name: showDecisionCurves
                label: '  Decision Curves'
                enable: (performDCA)
      - type: Label
        label: Clinical Utility Metrics
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performClinicalUtilityAnalysis
                label: Enable Clinical Utility Metrics
              - type: TextBox
                name: clinicalUtilityPrevalence
                label: '  Disease Prevalence'
                format: number
                enable: (performClinicalUtilityAnalysis)
              - type: TextBox
                name: clinicalUtilityTimePoint
                label: '  Time Point (months)'
                format: number
                enable: (performClinicalUtilityAnalysis)
              - type: ComboBox
                name: clinicalUtilityThresholds
                label: '  Risk Thresholds'
                enable: (performClinicalUtilityAnalysis)
              - type: CheckBox
                name: clinicalUtilityNNT
                label: '  Number Needed to Treat (NNT)'
                enable: (performClinicalUtilityAnalysis)
              - type: TextBox
                name: clinicalUtilityTreatmentEffect
                label: '    Treatment Effect (HR)'
                format: number
                enable: (clinicalUtilityNNT)
              - type: CheckBox
                name: clinicalUtilityComparison
                label: '  Compare Staging Systems'
                enable: (performClinicalUtilityAnalysis)
      - type: Label
        label: Cost-Effectiveness
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: clinicalUtilityCostEffectiveness
                label: Cost-Effectiveness Analysis
                enable: (performClinicalUtilityAnalysis)
              - type: TextBox
                name: clinicalUtilityCostPerIntervention
                label: '  Cost per Intervention ($)'
                format: number
                enable: (clinicalUtilityCostEffectiveness)
      - type: Label
        label: Advanced Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: clinicalUtilityBootstrap
                label: Bootstrap Confidence Intervals
                enable: (performClinicalUtilityAnalysis)
              - type: TextBox
                name: clinicalUtilityBootstrapSamples
                label: '  Bootstrap Samples'
                format: number
                enable: (clinicalUtilityBootstrap)
              - type: CheckBox
                name: clinicalUtilityTimeVarying
                label: Time-Varying Analysis
                enable: (performClinicalUtilityAnalysis)
              - type: TextBox
                name: clinicalSignificanceThreshold
                label: Clinical Significance Threshold
                format: number
  - type: CollapseBox
    label: 🚀 Advanced Models
    collapsed: true
    children:
      - type: Label
        label: RMST Analysis
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: calculateRMST
                label: Restricted Mean Survival Time (RMST)
              - type: TextBox
                name: plotTimeRange
                label: '  Time Horizon (months)'
                format: string
                enable: (calculateRMST)
      - type: Label
        label: Optimal Cutpoint Analysis
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performOptimalCutpoint
                label: Enable Cutpoint Analysis
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Continuous Variable for Cutpoint
            children:
              - type: VariablesListBox
                name: continuousStageVariable
                maxItemCount: 1
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: cutpointMethod
            label: Method
            enable: (performOptimalCutpoint)
          - type: TextBox
            name: cutpointRange
            label: Search Range (min,max)
            format: string
            enable: (performOptimalCutpoint)
          - type: CheckBox
            name: validateCutpoint
            label: Validate Cutpoint
            enable: (performOptimalCutpoint)
          - type: CheckBox
            name: cutpointBootstrap
            label: '  Bootstrap Validation'
            enable: (validateCutpoint)
          - type: TextBox
            name: cutpointBootstrapReps
            label: '    Repetitions'
            format: number
            enable: (cutpointBootstrap)
          - type: CheckBox
            name: generateStagingSystem
            label: Generate Staging System
            enable: (performOptimalCutpoint)
          - type: TextBox
            name: stagingSystemLevels
            label: '  Number of Stages'
            format: number
            enable: (generateStagingSystem)
      - type: Label
        label: Multi-State Models
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performMultiStateAnalysis
                label: Enable Multi-State Models
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: State Variable
            children:
              - type: VariablesListBox
                name: stateVariable
                maxItemCount: 1
                isTarget: true
          - type: TargetLayoutBox
            label: Transition Time
            children:
              - type: VariablesListBox
                name: transitionTimeVariable
                maxItemCount: 1
                isTarget: true
          - type: TargetLayoutBox
            label: Covariates
            children:
              - type: VariablesListBox
                name: multiStateCovariates
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: multiStateModel
            label: Model Type
            enable: (performMultiStateAnalysis)
          - type: TextBox
            name: multiStateStates
            label: State Names (comma-separated)
            format: string
            enable: (performMultiStateAnalysis)
          - type: TextBox
            name: absorptionStates
            label: Absorbing States
            format: string
            enable: (performMultiStateAnalysis)
          - type: TextBox
            name: multiStateTimePoints
            label: Time Points (months)
            format: string
            enable: (performMultiStateAnalysis)
          - type: CheckBox
            name: calculateTransitionProbabilities
            label: Transition Probabilities
            enable: (performMultiStateAnalysis)
          - type: CheckBox
            name: generateTransitionMatrix
            label: Transition Matrix
            enable: (performMultiStateAnalysis)
          - type: CheckBox
            name: multiStateGraphics
            label: State Diagrams
            enable: (performMultiStateAnalysis)
          - type: CheckBox
            name: msStratifyByStaging
          - type: CheckBox
            name: multiStateValidation
          - type: CheckBox
            name: generateMSMSummary
      - type: Label
        label: Interval Censoring
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performIntervalCensoringAnalysis
                label: Enable Interval Censoring
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Left Interval Time
            children:
              - type: VariablesListBox
                name: intervalCensoringLeftTime
                maxItemCount: 1
                isTarget: true
          - type: TargetLayoutBox
            label: Right Interval Time
            children:
              - type: VariablesListBox
                name: intervalCensoringRightTime
                maxItemCount: 1
                isTarget: true
          - type: TargetLayoutBox
            label: Adjustment Variables
            children:
              - type: VariablesListBox
                name: intervalCensoringAdjustVariables
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: intervalCensoringDistribution
            label: Distribution
            enable: (performIntervalCensoringAnalysis)
          - type: ComboBox
            name: intervalCensoringModel
            label: Model Type
            enable: (performIntervalCensoringAnalysis)
          - type: CheckBox
            name: intervalCensoringCompareStages
            label: Compare Stages
            enable: (performIntervalCensoringAnalysis)
          - type: CheckBox
            name: intervalCensoringPlots
            label: Survival Plots
            enable: (performIntervalCensoringAnalysis)
          - type: CheckBox
            name: intervalCensoringDiagnostics
      - type: Label
        label: Frailty Models
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performFrailtyModelsAnalysis
                label: Enable Frailty Models
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Cluster Variable
            children:
              - type: VariablesListBox
                name: frailtyClusterVariable
                maxItemCount: 1
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: frailtyDistribution
            label: Frailty Distribution
            enable: (performFrailtyModelsAnalysis)
          - type: CheckBox
            name: frailtyVarianceComponents
            label: Variance Components
            enable: (performFrailtyModelsAnalysis)
          - type: CheckBox
            name: frailtyHeterogeneityTest
            label: Heterogeneity Test
            enable: (performFrailtyModelsAnalysis)
          - type: CheckBox
            name: frailtyClusterComparison
            label: Cluster Comparison
            enable: (performFrailtyModelsAnalysis)
          - type: CheckBox
            name: frailtyModelSelection
          - type: CheckBox
            name: frailtyPredictiveAccuracy
          - type: CheckBox
            name: frailtyDiagnostics
          - type: CheckBox
            name: frailtyAdvancedInference
      - type: Label
        label: Cure Models
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performCureModelAnalysis
                label: Enable Cure Models
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Cure Model Covariates
            children:
              - type: VariablesListBox
                name: cureCovariates
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: cureModelType
            label: Model Type
            enable: (performCureModelAnalysis)
          - type: ComboBox
            name: cureDistribution
            label: Distribution
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: cureAnalyzeOldStage
            label: Analyze Old Stage
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: cureAnalyzeNewStage
            label: Analyze New Stage
            enable: (performCureModelAnalysis)
          - type: ComboBox
            name: cureFractionEstimation
            label: Cure Fraction Method
            enable: (performCureModelAnalysis)
          - type: TextBox
            name: cureConfidenceLevel
            label: Confidence Level
            format: number
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: cureBootstrapCI
            label: Bootstrap CI
            enable: (performCureModelAnalysis)
          - type: TextBox
            name: cureBootstrapReps
            label: '  Repetitions'
            format: number
            enable: (cureBootstrapCI)
          - type: TextBox
            name: cureTimeHorizon
            label: Time Horizon (months)
            format: number
            enable: (performCureModelAnalysis)
          - type: TextBox
            name: curePlateauThreshold
            label: Plateau Threshold
            format: number
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: cureModelComparison
            label: Model Comparison
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: cureStageSpecificAnalysis
            label: Stage-Specific Analysis
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: cureGoodnessOfFit
            label: Goodness-of-Fit
            enable: (performCureModelAnalysis)
          - type: CheckBox
            name: generateCureSummary
            label: Generate Summary
            enable: (performCureModelAnalysis)
      - type: Label
        label: Informative Censoring
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performInformativeCensoringAnalysis
                label: Enable Informative Censoring
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Censoring Mechanism Covariates
            children:
              - type: VariablesListBox
                name: informativeCensoringCovariates
                isTarget: true
          - type: TargetLayoutBox
            label: IPW Model Variables
            children:
              - type: VariablesListBox
                name: informativeCensoringIPWVariables
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: informativeCensoringTestMethod
            label: Test Method
            enable: (performInformativeCensoringAnalysis)
          - type: TextBox
            name: informativeCensoringLandmarkTimes
            label: Landmark Times (comma-separated)
            format: string
            enable: (performInformativeCensoringAnalysis)
          - type: ComboBox
            name: informativeCensoringAdjustmentMethod
            label: Adjustment Method
            enable: (performInformativeCensoringAnalysis)
          - type: TextBox
            name: informativeCensoringSensitivityRange
            label: Sensitivity Range
            format: string
            enable: (performInformativeCensoringAnalysis)
          - type: CheckBox
            name: informativeCensoringBootstrap
            label: Bootstrap
            enable: (performInformativeCensoringAnalysis)
          - type: TextBox
            name: informativeCensoringBootstrapSamples
            label: '  Samples'
            format: number
            enable: (informativeCensoringBootstrap)
          - type: TextBox
            name: informativeCensoringAlpha
            label: Significance Level
            format: number
            enable: (performInformativeCensoringAnalysis)
          - type: CheckBox
            name: informativeCensoringPlots
            label: Diagnostic Plots
            enable: (performInformativeCensoringAnalysis)
          - type: CheckBox
            name: informativeCensoringCompareStages
            label: Compare Stages
            enable: (performInformativeCensoringAnalysis)
      - type: Label
        label: Concordance Probability
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: performConcordanceProbabilityAnalysis
                label: Enable Concordance Probability
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Adjustment Variables
            children:
              - type: VariablesListBox
                name: concordanceProbabilityAdjustVariables
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: concordanceProbabilityMethods
            label: Methods
            enable: (performConcordanceProbabilityAnalysis)
          - type: TextBox
            name: concordanceProbabilityTimePoints
            label: Time Points (comma-separated)
            format: string
            enable: (performConcordanceProbabilityAnalysis)
          - type: ComboBox
            name: concordanceProbabilityWeighting
            label: Weighting
            enable: (performConcordanceProbabilityAnalysis)
          - type: CheckBox
            name: concordanceProbabilityBootstrap
            label: Bootstrap
