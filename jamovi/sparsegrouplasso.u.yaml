title: Sparse Group LASSO
name: sparsegrouplasso
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Time Variable
        children:
          - type: VariablesListBox
            name: time_var
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Event Variable
        children:
          - type: VariablesListBox
            name: event_var
            maxItemCount: 1
            isTarget: true
          - type: LevelSelector
            name: outcomeLevel
            enable: (event_var)
          - type: LevelSelector
            name: censorLevel
            enable: (event_var)
      - type: TargetLayoutBox
        label: Predictor Variables
        children:
          - type: VariablesListBox
            name: pred_vars
            isTarget: true

  - type: CollapseBox
    label: Data Suitability
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: suitabilityCheck

  - type: CollapseBox
    label: Group Definition
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: group_definition
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: custom_groups
            format: string
            enable: (group_definition:custom)
      - type: VariableSupplier
        persistentItems: false
        stretchFactor: 1
        children:
          - type: TargetLayoutBox
            label: Pathway Information
            children:
              - type: VariablesListBox
                name: pathway_info
                maxItemCount: 1
                isTarget: true
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: correlation_threshold
            format: number
            enable: (group_definition:correlation_based)

  - type: CollapseBox
    label: Penalty & Lambda
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: alpha_sgl
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: lambda_sequence
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: custom_lambda
            format: string
            enable: (lambda_sequence:custom)
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: lambda_min_ratio
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: n_lambda
            format: number

  - type: CollapseBox
    label: Cross-Validation
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: selection_criterion
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: cv_folds
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: cv_repeats
            format: number

  - type: CollapseBox
    label: Validation & Stability
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: confidence_intervals
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: bootstrap_samples
            format: number
            enable: (confidence_intervals)
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: alpha_level
            format: number
            enable: (confidence_intervals)
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: stability_selection
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: stability_threshold
            format: number
            enable: (stability_selection)
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: stability_subsample
            format: number
            enable: (stability_selection)

  - type: CollapseBox
    label: Advanced Optimization
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: standardize_vars
          - type: CheckBox
            name: center_vars
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: seed_value
            format: number
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: ebic_gamma
            format: number
            enable: (selection_criterion:ebic)
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: weight_type
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: weight_power
            format: number
            enable: (weight_type:ridge_based || weight_type:univariate_based || weight_type:lasso_based)

  - type: CollapseBox
    label: Plots
    collapsed: true
    children:
      - type: CheckBox
        name: plot_cv_error
      - type: CheckBox
        name: plot_coefficients
      - type: CheckBox
        name: plot_groups
      - type: CheckBox
        name: plot_sparsity
      - type: CheckBox
        name: plot_stability

  - type: CollapseBox
    label: Results Display
    collapsed: true
    children:
      - type: CheckBox
        name: show_summary
      - type: CheckBox
        name: show_coefficients
      - type: CheckBox
        name: show_groups
      - type: CheckBox
        name: show_path
      - type: CheckBox
        name: show_performance
      - type: CheckBox
        name: show_validation
      - type: CheckBox
        name: showExplanations
