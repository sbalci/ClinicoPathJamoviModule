---
name: timeroc
title: Enhanced ROC Analysis
menuGroup: SurvivalT
menuSubgroup: ClinicoPath Survival
menuSubtitle: 'Time-Dependent & Binary ROC'
version: '1.1.0'
jas: '1.2'

options:
    - name: data
      type: Data

    - name: elapsedtime
      title: 'Time Elapsed'
      type: Variable
      suggested: [ continuous ]

      default: null

    - name: outcome
      title: 'Outcome'
      type: Variable
      suggested: [ ordinal, nominal, continuous ]

      default: null

    - name: outcomeLevel
      title: Event Level
      type: Level
      variable: (outcome)


    - name: marker
      title: 'Marker Variable'
      type: Variable
      suggested: [ continuous ]

      default: null

    - name: timepoints
      title: Evaluation Timepoints
      type: String
      default: '12, 36, 60'

    - name: method
      title: IPCW Weighting Method
      type: List
      options:
        - title: Kaplan-Meier (Marginal)
          name: marginal
        - title: Cox Model
          name: cox
        - title: Aalen Additive Model
          name: aalen
      default: marginal
      description:
        R: >
          Method for Inverse Probability of Censoring Weights.
          Marginal uses Kaplan-Meier and assumes independent censoring.
          Cox and Aalen adjust for covariates affecting censoring.

    - name: bootstrapCI
      title: Confidence Intervals (Asymptotic)
      type: Bool
      default: false
      description:
        R: >
          Compute asymptotic confidence intervals for AUC using
          influence function-based variance estimation.

    - name: nboot
      title: Number of Bootstrap Samples
      type: Integer
      default: 100
      min: 10
      max: 1000
      hidden: true
      description:
        R: >
          Deprecated. Kept for backward compatibility with saved analyses.
          The CI computation uses analytic influence functions, not bootstrap.

    - name: plotROC
      title: Plot ROC Curves
      type: Bool
      default: true

    - name: plotAUC
      title: Plot AUC Over Time
      type: Bool
      default: true

    - name: timetypeoutput
      title: Time Units
      type: List
      options:
        - title: days
          name: days
        - title: weeks  
          name: weeks
        - title: months
          name: months
        - title: years
          name: years
      default: months
      description:
        R: >
          Time units for display in plots and results.

    - name: showOptimalCutoff
      title: Show Optimal Cutoff Values
      type: Bool
      default: true
      description:
        R: >
          Calculate and display optimal cutoff points that maximize Youden index.

    - name: showMarkerStats
      title: Show Marker Statistics
      type: Bool  
      default: true
      description:
        R: >
          Display descriptive statistics for the marker variable.

    - name: compareBaseline
      title: Compare to Baseline Model
      type: Bool
      default: false
      description:
        R: >
          Compare marker performance to a baseline model (AUC = 0.5).

    - name: smoothAUC
      title: Smooth AUC Curve
      type: Bool
      default: false
      description:
        R: >
          Apply smoothing to the AUC over time plot for better visualization.

    - name: analysisType
      title: Analysis Type
      type: List
      options:
        - title: Time-Dependent ROC
          name: timedep
        - title: General Binary ROC
          name: binary
      default: timedep
      description:
        R: >
          Choose between time-dependent ROC analysis or general binary classification ROC.

    - name: compareROCs
      title: Compare ROC Curves
      type: Bool
      default: false
      description:
        R: >
          Compare multiple ROC curves using statistical tests (DeLong test for binary ROC).

    - name: markers
      title: 'Multiple Markers (for comparison)'
      type: Variables
      suggested: [ continuous ]
      permitted: [ numeric ]
      default: []
      description:
        R: >
          Additional marker variables to compare against the primary marker.

    - name: rocComparison
      title: ROC Comparison Method
      type: List
      options:
        - title: DeLong Test
          name: delong
        - title: Bootstrap Test  
          name: bootstrap
        - title: Venkatraman Test
          name: venkatraman
      default: delong
      description:
        R: >
          Statistical method for comparing ROC curves (binary analysis only).

    - name: youdenIndex
      title: Calculate Youden Index
      type: Bool
      default: true
      description:
        R: >
          Calculate Youden index (sensitivity + specificity - 1) for optimal threshold selection.

...
